<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found · Aashutosh Kumar Gupta</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;600&family=DM+Sans:wght@400;500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:    #080c14;
      --gold:  #c9a84c;
      --gold2: #e6c97a;
      --text:  #e8eaf2;
      --text2: #9aa5bc;
      --text3: #5a6680;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      overflow: hidden;
    }

    /* Ambient glow */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      background:
        radial-gradient(ellipse 50% 45% at 20% 20%, rgba(201,168,76,.06) 0%, transparent 65%),
        radial-gradient(ellipse 40% 50% at 80% 80%, rgba(30,60,140,.12) 0%, transparent 60%);
    }

    .container { max-width: 540px; }

    .code {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(6rem, 18vw, 11rem);
      font-weight: 300;
      line-height: 1;
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -.04em;
      margin-bottom: 8px;
      animation: float 4s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0);    }
      50%       { transform: translateY(-10px); }
    }

    .label {
      font-family: 'JetBrains Mono', monospace;
      font-size: .72rem;
      color: var(--gold);
      letter-spacing: .25em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 600;
      margin-bottom: 16px;
      line-height: 1.2;
    }

    p {
      color: var(--text2);
      font-size: .95rem;
      line-height: 1.75;
      margin-bottom: 40px;
    }

    .btn {
      display: inline-block;
      padding: 13px 30px;
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      color: var(--bg);
      font-family: 'DM Sans', sans-serif;
      font-size: .84rem;
      font-weight: 700;
      letter-spacing: .09em;
      text-transform: uppercase;
      text-decoration: none;
      transition: transform .28s cubic-bezier(.34,1.56,.64,1),
                  box-shadow .28s ease;
    }
    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 32px rgba(201,168,76,.42);
    }

    .divider {
      width: 60px; height: 1px;
      background: linear-gradient(to right, var(--gold), transparent);
      margin: 0 auto 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="code">404</div>
    <div class="label">Page Not Found</div>
    <div class="divider"></div>
    <h1>This Page Doesn't Exist</h1>
    <p>
      The page you're looking for may have been moved, renamed, or is temporarily unavailable.
      Head back to the portfolio homepage to explore my work.
    </p>
    <a href="/" class="btn">← Back to Portfolio</a>
  </div>
</body>
</html>
